<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Hương❤️</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lobster&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Nhạc nền -->
    <audio id="bg-music" src="music/happybirthday.mp3" loop preload="auto"></audio>

    <!-- 1. Màn hình Loading -->
    <section id="loading-screen">
        <div class="loading-container">
            <p>Something special is coming....😆</p>
            <div class="progress-bar">
                <div class="progress"></div>
            </div>
        </div>
    </section>

    <!-- 2. Màn hình Intro -->
    <section id="intro-screen" class="hidden fade-in">
        <div class="intro-content">
            <h1>Hi Huong,...</h1>
            <button id="open-gift-btn">Open My Gift 🎁</button>
        </div>
    </section>

    <!-- 3. Màn hình Hộp Quà -->
    <section id="gift-screen" class="hidden">
        <div class="gift-container">
            <div id="gift-box" class="gift-box shake-animation">
                <img src="images/gift.png" alt="Gift Box">
            </div>
            <div id="gift-glow" class="glow hidden"></div>
        </div>
    </section>
    <!-- Tấm thiệp xinh xắn -->
    <div id="card-screen" class="hidden">
        <div class="card">
            <p id="card-text"></p>
            <button id="heart-btn" class="hidden">❤️</button>
        </div>
    </div>
    <!-- 4. Màn hình Chúc Mừng Sinh Nhật (Main Scene) -->
    <section id="birthday-scene" class="hidden">
        <canvas id="fireworks-canvas"></canvas>
        <div id="balloons-container"></div>
        <div id="hearts-container"></div>

        <div class="birthday-content">
            <div id="typing-text" class="typing-container"></div>
            
<!-- Bắt đầu cuốn album sách -->
<div class="book-container">
    <div class="book">
        <div class="page" id="page4">
            <div class="front"><img src="images/photo4.jpg" alt="Kỷ niệm 4"></div>
            <div class="back"></div>
        </div>
        <!-- Trang 3 (Nằm dưới cùng) -->
        <div class="page" id="page3">
            <div class="front"><img src="images/photo3.jpg" alt="Kỷ niệm 3"></div>
            <div class="back"></div>
        </div>
        
        <!-- Trang 2 (Nằm giữa) -->
        <div class="page" id="page2">
            <div class="front"><img src="images/photo2.jpg" alt="Kỷ niệm 2"></div>
            <div class="back"></div>
        </div>
        
        <!-- Trang 1 (Bìa ngoài cùng) -->
        <div class="page" id="page1">
            <div class="front"><img src="images/photo1.png" alt="Kỷ niệm 1"></div>
            <div class="back"><p class="message">Click tiếp nhé!</p></div>
        </div>
    </div>
    <p class="guide-text">(Click vào ảnh để lật trang 📖)</p>
</div>
<!-- Kết thúc cuốn album sách -->

            <button id="replay-btn" class="open-gift-btn">Replay 🔄</button>
        </div>
    </section>

    <!-- Liên kết các file JS theo thứ tự -->
    <script src="js/fireworks.js"></script>
    <script src="js/balloons.js"></script>
    <script src="js/typing.js"></script>
    <script src="script.js"></script>
</body>
</html>
